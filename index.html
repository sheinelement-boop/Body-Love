<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FLEXAI — Тренер</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
:root{--bg:#0a0a0f;--surf:#12121a;--surf2:#1a1a26;--bord:rgba(255,255,255,0.08);--acc:#c8ff00;--acc2:#00d4ff;--acc3:#ff6b35;--txt:#f0f0f0;--muted:#666;--f:'Space Grotesk',sans-serif}
body{font-family:var(--f);background:var(--bg);color:var(--txt);overflow:hidden;display:flex;flex-direction:column;height:100dvh}

.hdr{background:var(--surf);border-bottom:1px solid var(--bord);padding:calc(10px + env(safe-area-inset-top)) 16px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:2px;color:var(--acc)}
.logo span{color:var(--acc2)}
.hstatus{font-size:12px;color:var(--muted)}
.hdot{width:8px;height:8px;border-radius:50%;background:var(--acc);box-shadow:0 0 6px var(--acc);animation:dp 2s ease-in-out infinite;margin-left:auto}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.3}}

.stats-row{display:flex;gap:7px;padding:10px 12px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.stats-row::-webkit-scrollbar{display:none}
.sc{background:var(--surf);border:1px solid var(--bord);border-radius:11px;padding:8px 12px;display:flex;flex-direction:column;align-items:center;min-width:60px;flex-shrink:0}
.sc-val{font-size:16px;font-weight:700;line-height:1}
.sc-lbl{font-size:10px;color:var(--muted);margin-top:3px}
.ac{color:var(--acc)}.ac2{color:var(--acc2)}.ac3{color:var(--acc3)}

.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px;-webkit-overflow-scrolling:touch}
.msgs::-webkit-scrollbar{display:none}
.row{display:flex;gap:8px;align-items:flex-end;animation:mi .2s ease}
@keyframes mi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.row.u{flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.bav{background:#0d1a0d;border:1px solid var(--acc)}
.uav{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#000;font-weight:700;font-size:12px}
.bub{max-width:80%;padding:10px 14px;border-radius:17px;font-size:15px;line-height:1.5;word-break:break-word}
.bb{background:var(--surf);border:1px solid var(--bord);border-bottom-left-radius:4px}
.ub{background:var(--acc);color:#000;font-weight:600;border-bottom-right-radius:4px}
.hl{color:var(--acc);font-weight:700}.hl2{color:var(--acc2);font-weight:700}

.chips{display:flex;gap:6px;padding:4px 12px 8px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:8px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--bord);background:var(--surf);color:var(--txt);white-space:nowrap;transition:all .15s;user-select:none}
.chip:active{border-color:var(--acc);color:var(--acc);transform:scale(.97)}

.vstatus{font-size:12px;padding:0 14px 5px;min-height:18px;text-align:center;color:var(--muted);flex-shrink:0}
.vstatus.rec{color:var(--acc3)}.vstatus.think{color:var(--acc)}.vstatus.spk{color:var(--acc2)}

.bar{background:var(--surf);border-top:1px solid var(--bord);padding:10px 12px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.inp{flex:1;background:var(--surf2);border:1.5px solid var(--bord);border-radius:20px;padding:11px 15px;font-family:var(--f);font-size:16px;color:var(--txt);outline:none;resize:none;max-height:90px;overflow-y:auto;line-height:1.4}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--muted)}
.micb{width:48px;height:48px;border-radius:50%;border:2px solid var(--bord);background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;transition:all .2s;user-select:none}
.micb.rec{border-color:var(--acc3);background:rgba(255,107,53,.18);animation:rp 1s ease-in-out infinite}
.micb.spk{border-color:var(--acc2);background:rgba(0,212,255,.12);animation:sp .9s ease-in-out infinite}
@keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,.5)}50%{box-shadow:0 0 0 11px rgba(255,107,53,0)}}
@keyframes sp{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.5)}50%{box-shadow:0 0 0 11px rgba(0,212,255,0)}}
.sndb{width:48px;height:48px;border-radius:50%;background:var(--acc);border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;user-select:none}
.sndb:active{transform:scale(.93)}
.sndb:disabled{opacity:.35}
.sndb svg{width:19px;height:19px;fill:#000}
.typ{display:flex;gap:4px;align-items:center;padding:10px 14px;background:var(--surf);border:1px solid var(--bord);border-radius:15px;border-bottom-left-radius:4px;width:fit-content}
.td{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:ty 1.1s infinite}
.td:nth-child(2){animation-delay:.18s}.td:nth-child(3){animation-delay:.36s}
@keyframes ty{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">FLEX<span>AI</span></div>
  <span class="hstatus">Тренер онлайн</span>
  <div class="hdot"></div>
</div>

<div class="stats-row">
  <div class="sc"><span class="sc-val ac">74%</span><span class="sc-lbl">цели</span></div>
  <div class="sc"><span class="sc-val ac">1840</span><span class="sc-lbl">ккал</span></div>
  <div class="sc"><span class="sc-val ac2">7420</span><span class="sc-lbl">шагов</span></div>
  <div class="sc"><span class="sc-val ac3">68</span><span class="sc-lbl">уд/мин</span></div>
  <div class="sc"><span class="sc-val">7.3ч</span><span class="sc-lbl">сон</span></div>
  <div class="sc"><span class="sc-val ac">1.4л</span><span class="sc-lbl">вода</span></div>
</div>

<div class="msgs" id="msgs">
  <div class="row">
    <div class="av bav">💪</div>
    <div class="bub bb">Привет! Я твой карманный тренер.<br><br>Нажми <span class="hl2">🎤</span> и говори — отвечу голосом. Или пиши. Чем помочь? 🎯</div>
  </div>
</div>

<div class="chips">
  <div class="chip" onclick="chip(this)">📋 План питания</div>
  <div class="chip" onclick="chip(this)">💪 Тренировка</div>
  <div class="chip" onclick="chip(this)">🥗 После тренировки</div>
  <div class="chip" onclick="chip(this)">😴 Восстановление</div>
  <div class="chip" onclick="chip(this)">🎯 Мотивируй!</div>
</div>

<div class="vstatus" id="vstatus"></div>

<div class="bar">
  <button class="micb" id="micb" onclick="toggleMic()" aria-label="Голос"><span id="mici">🎤</span></button>
  <textarea class="inp" id="inp" placeholder="Напиши или 🎤 голосом..." rows="1" onkeydown="onKey(event)" oninput="grow(this)"></textarea>
  <button class="sndb" id="sndb" onclick="send(false)" aria-label="Отправить"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
</div>

<script>
const SYS=`Ты FLEXAI — голосовой AI-тренер в кармане. Говоришь по-русски. Отвечай коротко — 2-3 предложения, ответ озвучивается. Без эмодзи, без форматирования — как живой тренер.
Профиль: Алекс, 78 кг, 181 см, 28 лет, рекомпозиция, 4-5 трен/нед.
Нормы: 2200 ккал, 160г белка, 70г жира, 220г углеводов.
Сегодня: шаги 7420, ккал 1840, ЧСС 68, сон 7.3ч, вода 1.4л.`;
let msgs=[],loading=false,rec=null,isRec=false;
const syn=window.speechSynthesis;
function ruVoice(){const vs=syn.getVoices();return vs.find(v=>v.lang==='ru-RU')||vs.find(v=>v.lang.startsWith('ru'))||null;}
function speak(t){if(!syn)return;syn.cancel();const u=new SpeechSynthesisUtterance(t.replace(/[*_`#\-•]/g,'').replace(/\n+/g,'. '));u.lang='ru-RU';u.rate=1.05;u.pitch=1.1;const v=ruVoice();if(v)u.voice=v;u.onstart=()=>setState('spk');u.onend=u.onerror=()=>setState('idle');syn.speak(u);}
function setState(s){const b=document.getElementById('micb'),i=document.getElementById('mici'),st=document.getElementById('vstatus');b.className='micb';st.className='vstatus';st.textContent='';if(s==='rec'){b.classList.add('rec');i.textContent='⏹';st.classList.add('rec');st.textContent='🔴 Слушаю... нажми ещё раз';}else if(s==='think'){i.textContent='⏳';st.classList.add('think');st.textContent='💭 Думаю...';}else if(s==='spk'){b.classList.add('spk');i.textContent='🔊';st.classList.add('spk');st.textContent='🔊 Говорю... нажми чтобы остановить';}else{i.textContent='🎤';}}
function initRec(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return null;const r=new SR();r.lang='ru-RU';r.continuous=false;r.interimResults=false;r.onresult=e=>{document.getElementById('inp').value=e.results[0][0].transcript;isRec=false;send(true);};r.onerror=e=>{isRec=false;setState('idle');if(e.error!=='no-speech'&&e.error!=='aborted')addMsg('Не распознал. Попробуй ещё.',false,false);};r.onend=()=>{if(isRec){isRec=false;setState('idle');}};return r;}
function toggleMic(){if(syn.speaking){syn.cancel();setState('idle');return;}if(!rec)rec=initRec();if(!rec){addMsg('Голосовой ввод работает в Safari/Chrome на iPhone. Текстом работает везде.',false,false);return;}if(isRec){rec.stop();isRec=false;setState('idle');}else{isRec=true;setState('rec');try{rec.start();}catch(e){isRec=false;setState('idle');}}}
async function callAI(text){msgs.push({role:'user',content:text});const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:SYS,messages:msgs})});const d=await r.json();const t=d.content?.[0]?.text||'Что-то пошло не так.';msgs.push({role:'assistant',content:t});return t;}
function addMsg(text,isUser,withSpeak){const c=document.getElementById('msgs');const row=document.createElement('div');row.className='row'+(isUser?' u':'');const av=document.createElement('div');av.className='av '+(isUser?'uav':'bav');av.textContent=isUser?'Я':'💪';const bub=document.createElement('div');bub.className='bub '+(isUser?'ub':'bb');bub.innerHTML=text.replace(/\n/g,'<br>');row.appendChild(av);row.appendChild(bub);c.appendChild(row);c.scrollTop=c.scrollHeight;if(!isUser&&withSpeak)speak(text);}
function showTyping(){const c=document.getElementById('msgs');const w=document.createElement('div');w.className='row';w.id='tw';const av=document.createElement('div');av.className='av bav';av.textContent='💪';const t=document.createElement('div');t.className='typ';[1,2,3].forEach(()=>{const d=document.createElement('div');d.className='td';t.appendChild(d);});w.appendChild(av);w.appendChild(t);c.appendChild(w);c.scrollTop=c.scrollHeight;}
function rmTyping(){const e=document.getElementById('tw');if(e)e.remove();}
async function send(vr){const inp=document.getElementById('inp'),btn=document.getElementById('sndb');const text=inp.value.trim();if(!text||loading)return;loading=true;btn.disabled=true;inp.value='';inp.style.height='auto';addMsg(text,true,false);setState('think');showTyping();try{const rep=await callAI(text);rmTyping();addMsg(rep,false,vr);if(!vr)setState('idle');}catch(e){rmTyping();setState('idle');addMsg('⚠️ Ошибка соединения.',false,false);}loading=false;btn.disabled=false;}
function chip(el){document.getElementById('inp').value=el.textContent.trim();send(false);}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(false);}}
function grow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px';}
syn.getVoices&&syn.getVoices();if('onvoiceschanged' in syn)syn.onvoiceschanged=()=>{};
</script>
</body>
</html>
